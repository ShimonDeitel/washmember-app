name: Car Wash Membership
options:
  bundleIdPrefix: com.shimondeitel.washmember
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Car Wash Membership:
    type: application
    platform: iOS
    sources:
      - path: Car Wash Membership
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.washmember
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Car Wash Membership/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Car Wash MembershipTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Car Wash MembershipTests
      - path: Car Wash Membership.storekit
    dependencies:
      - target: Car Wash Membership
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.washmember.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Car Wash MembershipUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Car Wash MembershipUITests
    dependencies:
      - target: Car Wash Membership
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.washmember.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Car Wash Membership:
    build:
      targets:
        Car Wash Membership: all
        Car Wash MembershipTests: [test]
        Car Wash MembershipUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Car Wash Membership.storekit
    test:
      config: Debug
      storeKitConfiguration: Car Wash Membership.storekit
      targets:
        - Car Wash MembershipTests
        - Car Wash MembershipUITests
    archive:
      config: Release
